<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyConnect - Satellite SIM Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --navy: #0d2137;
  --navy-light: #142d4a;
  --navy-dark: #091828;
  --coral: #e63956;
  --coral-hover: #d42e4a;
  --gray-50: #f8f9fb;
  --gray-100: #eef1f5;
  --gray-200: #dde2ea;
  --gray-300: #b8c1ce;
  --gray-500: #6b7a8d;
  --gray-700: #374151;
  --green: #10b981;
  --amber: #f59e0b;
  --red: #ef4444;
  --blue: #3b82f6;
}
body { font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--gray-50); color: var(--gray-700); }
h1, h2, h3, .page-header h1, .card-header h2, .card-coral-header, .login-logo, .stat-card .stat-value { font-family: 'League Spartan', sans-serif; }
a { color: var(--coral); text-decoration: none; }

/* === LOGIN === */
#loginPage {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, var(--navy-dark) 0%, var(--navy) 50%, var(--navy-light) 100%);
}
.login-box {
  background: #fff;
  border-radius: 16px;
  padding: 48px 40px;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 20px 60px rgba(0,0,0,.3);
  text-align: center;
}
.login-logo { margin-bottom: 8px; }
.login-logo img, .login-logo svg { max-width: 200px; }
.login-subtitle { color: var(--gray-500); font-size: 14px; margin-bottom: 32px; }
.form-group { text-align: left; margin-bottom: 20px; }
.form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--gray-500); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%; padding: 12px 16px; border: 2px solid var(--gray-200); border-radius: 10px;
  font-size: 15px; transition: border-color .2s; outline: none; background: #fff;
}
.form-group input:focus, .form-group select:focus { border-color: var(--coral); }
.password-wrapper {
  position: relative;
  display: flex;
  align-items: center;
}
.password-wrapper input {
  padding-right: 44px;
}
.password-toggle {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  font-size: 18px;
  color: var(--gray-500);
  padding: 4px;
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}
.password-toggle:hover { color: var(--gray-700); }
.password-toggle svg { width: 20px; height: 20px; }
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 12px 24px; border-radius: 10px; font-size: 15px; font-weight: 600;
  border: none; cursor: pointer; transition: all .2s;
}
.btn-coral { background: var(--coral); color: #fff; }
.btn-coral:hover { background: var(--coral-hover); transform: translateY(-1px); }
.btn-navy { background: var(--navy); color: #fff; }
.btn-navy:hover { background: var(--navy-light); }
.btn-outline { background: transparent; border: 2px solid var(--gray-200); color: var(--gray-700); }
.btn-outline:hover { border-color: var(--coral); color: var(--coral); }
.btn-sm { padding: 8px 16px; font-size: 13px; }
.btn-green { background: var(--green); color: #fff; }
.btn-green:hover { opacity: .9; }
.btn-red { background: var(--red); color: #fff; }
.btn-red:hover { opacity: .9; }
.btn-disabled { opacity: .4; cursor: not-allowed; pointer-events: none; }
.btn-full { width: 100%; }
.login-error { color: var(--red); font-size: 14px; margin-top: 12px; display: none; }

/* === APP LAYOUT === */
#appPage { display: none; }
.app-layout { display: flex; min-height: 100vh; }
.sidebar {
  width: 250px; background: var(--navy); color: #fff; padding: 24px 0;
  display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100;
}
.sidebar-logo { padding: 0 24px 8px; text-align: center; }
.sidebar-logo img, .sidebar-logo svg { max-width: 160px; max-height: 60px; }
.sidebar-slogan { text-align: center; font-size: 12px; color: rgba(255,255,255,.4); letter-spacing: 3px; font-style: italic; padding: 0 24px 16px; border-bottom: 1px solid rgba(255,255,255,.1); }
.sidebar-nav { flex: 1; padding: 16px 0; overflow-y: auto; }
.nav-item {
  display: flex; align-items: center; gap: 12px; padding: 12px 24px;
  color: rgba(255,255,255,.6); cursor: pointer; transition: all .2s; font-size: 14px;
  position: relative;
}
.nav-item:hover { color: #fff; background: rgba(255,255,255,.05); }
.nav-item.active { color: #fff; background: rgba(255,255,255,.1); border-left: 3px solid var(--coral); }
.nav-item svg { width: 20px; height: 20px; flex-shrink: 0; }
.nav-sep { height: 1px; background: rgba(255,255,255,.08); margin: 8px 24px; }
.nav-dot {
  width: 8px; height: 8px; border-radius: 50%; background: #fff;
  display: none; margin-left: auto; flex-shrink: 0;
}
.nav-item[data-has-changes="true"] .nav-dot { display: block; }
.sidebar-footer { padding: 16px 24px; border-top: 1px solid rgba(255,255,255,.1); }
.user-info { font-size: 13px; color: rgba(255,255,255,.6); margin-bottom: 12px; }
.user-info strong { color: #fff; display: block; font-size: 14px; }
.btn-logout { width: 100%; padding: 8px; border-radius: 8px; background: rgba(255,255,255,.1); color: rgba(255,255,255,.7); border: none; cursor: pointer; font-size: 13px; }
.btn-logout:hover { background: rgba(255,255,255,.15); color: #fff; }

.main-content { margin-left: 250px; flex: 1; padding: 32px; min-height: 100vh; }
.page-header { margin-bottom: 28px; }
.page-header h1 { font-size: 26px; color: var(--navy); font-weight: 700; }
.page-header p { color: var(--gray-500); margin-top: 4px; }

/* === CARDS === */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }
.stat-card {
  background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.06);
  border: 1px solid var(--gray-100);
}
.stat-card .stat-label { font-size: 13px; color: var(--gray-500); text-transform: uppercase; letter-spacing: .5px; }
.stat-card .stat-value { font-size: 32px; font-weight: 700; color: var(--navy); margin-top: 4px; }

.card {
  background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 1px 3px rgba(0,0,0,.06);
  border: 1px solid var(--gray-100); margin-bottom: 20px;
}
.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.card-header h2 { font-size: 18px; color: var(--navy); }
.card-coral-header {
  background: var(--coral); color: #fff; margin: -24px -24px 20px -24px;
  padding: 16px 24px; border-radius: 12px 12px 0 0; font-size: 16px; font-weight: 700;
}

/* === TABLE === */
table { width: 100%; border-collapse: collapse; }
th { text-align: left; font-size: 12px; text-transform: uppercase; letter-spacing: .5px; color: var(--gray-500); padding: 12px 16px; border-bottom: 2px solid var(--gray-100); }
td { padding: 14px 16px; border-bottom: 1px solid var(--gray-100); font-size: 14px; }
tr:hover td { background: var(--gray-50); }
tr { cursor: pointer; }

/* === SEARCH === */
.search-bar {
  display: flex; gap: 12px; margin-bottom: 20px;
}
.search-bar input {
  flex: 1; padding: 10px 16px; border: 2px solid var(--gray-200); border-radius: 10px;
  font-size: 14px; outline: none; background: #fff;
}
.search-bar input:focus { border-color: var(--coral); }

/* === STATUS BADGES === */
.badge {
  display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
}
.badge-active { background: #d1fae5; color: #065f46; }
.badge-inactive { background: var(--gray-100); color: var(--gray-500); }
.badge-processing { background: #fef3c7; color: #92400e; }
.badge-pending { background: #dbeafe; color: #1e40af; }
.badge-approved { background: #d1fae5; color: #065f46; }
.badge-rejected { background: #fee2e2; color: #991b1b; }
.badge-op-proceso { background: #fef3c7; color: #92400e; }
.badge-op-fallida { background: #fee2e2; color: #991b1b; }
.badge-op-exitosa { background: #d1fae5; color: #065f46; }

/* === SIM PROFILE === */
.sim-profile { }
.sim-profile-header {
  padding-bottom: 20px; margin-bottom: 20px; border-bottom: 2px solid var(--gray-100);
}
.sim-profile-name-row {
  display: flex; align-items: center; gap: 10px; margin-bottom: 4px;
}
.sim-profile-name-row h2 { font-size: 22px; color: var(--navy); margin: 0; }
.sim-profile-name-row .edit-name-btn {
  background: none; border: none; cursor: pointer; font-size: 16px; padding: 2px 6px; color: var(--gray-500);
  display: inline-flex; align-items: center; justify-content: center;
}
.sim-profile-name-row .edit-name-btn:hover { color: var(--coral); }
.sim-profile-name-row .edit-name-btn svg { width: 16px; height: 16px; }
.sim-profile-name-input {
  font-size: 22px; color: var(--navy); font-weight: 700; border: 2px solid var(--coral);
  border-radius: 8px; padding: 4px 10px; outline: none; font-family: inherit;
}
.sim-serial-line {
  font-size: 14px; font-family: monospace; color: var(--gray-700); font-weight: 600; margin-bottom: 4px;
}
.sim-serial-line .isdn-part { color: var(--gray-700); }
.sim-profile-title .sim-number { font-size: 18px; color: var(--coral); font-weight: 600; }
.sim-profile-title .sim-serial { font-size: 13px; color: var(--gray-500); font-family: monospace; margin-top: 2px; }

.sim-activate-deactivate-bar {
  display: flex; gap: 10px; margin-top: 12px;
}

.sim-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
.sim-info-section { padding: 16px 0; }
.sim-info-section:nth-child(odd) { padding-right: 24px; border-right: 1px solid var(--gray-100); }
.sim-info-section:nth-child(even) { padding-left: 24px; }
.sim-info-section h3 {
  font-size: 13px; text-transform: uppercase; letter-spacing: 1px;
  color: var(--coral); margin-bottom: 14px; font-weight: 700;
}
.info-row { display: flex; justify-content: space-between; padding: 8px 0; align-items: flex-start; }
.info-label { color: var(--gray-500); font-size: 13px; }
.info-value { font-weight: 600; color: var(--gray-700); font-size: 14px; text-align: right; max-width: 60%; word-break: break-all; }
.info-subtext { font-size: 11px; color: var(--gray-500); font-style: italic; font-weight: 400; margin-top: 4px; line-height: 1.3; }

.refresh-balance-btn {
  background: none; border: none; cursor: pointer; font-size: 14px; padding: 2px 4px;
  vertical-align: middle; color: var(--blue);
  display: inline-flex; align-items: center; justify-content: center;
}
.refresh-balance-btn:hover { opacity: .7; }
.refresh-balance-btn svg { width: 16px; height: 16px; }

.sim-actions-bar {
  display: flex; gap: 10px; flex-wrap: wrap; padding: 16px 0;
  border-top: 2px solid var(--gray-100); border-bottom: 2px solid var(--gray-100);
  margin: 16px 0;
}

.sim-assign-grid {
  display: grid; grid-template-columns: 1fr; gap: 16px; align-items: end;
  padding-top: 16px;
}
.sim-assign-grid .form-group { margin-bottom: 0; }
.inline-edit { border: 1.5px solid var(--gray-200); border-radius: 8px; padding: 8px 12px; font-size: 14px; width: 100%; outline: none; }
.inline-edit:focus { border-color: var(--coral); }

/* === MODAL === */
.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.5);
  display: flex; align-items: center; justify-content: center; z-index: 1000;
}
.modal {
  background: #fff; border-radius: 16px; padding: 32px; width: 100%; max-width: 500px;
  max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.3);
}
.modal h2 { font-size: 20px; color: var(--navy); margin-bottom: 20px; }
.modal-actions { display: flex; gap: 12px; margin-top: 24px; }
.modal-actions .btn { flex: 1; }

/* === TOAST === */
.toast {
  position: fixed; bottom: 24px; right: 24px; padding: 16px 24px; border-radius: 12px;
  color: #fff; font-size: 14px; font-weight: 500; z-index: 2000;
  animation: slideIn .3s ease; max-width: 400px;
}
.toast-success { background: var(--green); }
.toast-error { background: var(--red); }
.toast-info { background: var(--blue); }
@keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

.back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--gray-500); font-size: 14px; margin-bottom: 16px; cursor: pointer; }
.back-link:hover { color: var(--coral); }

/* === PLACEHOLDER PAGES === */
.placeholder-page { text-align: center; padding: 60px 20px; }
.placeholder-page .icon { font-size: 48px; margin-bottom: 16px; }
.placeholder-page h2 { color: var(--navy); margin-bottom: 8px; }
.placeholder-page p { color: var(--gray-500); max-width: 400px; margin: 0 auto; }

/* === MI CUENTA 2-col grid === */
.my-account-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
}

/* === Readonly grayed inputs === */
.inline-edit[readonly] {
  background: #f3f4f6; color: var(--gray-500); cursor: default;
}

/* === Accept charges checkbox === */
.accept-charges-row {
  display: flex; align-items: center; gap: 8px; margin: 12px 0;
}
.accept-charges-row input[type="checkbox"] {
  width: 16px; height: 16px; accent-color: var(--coral); cursor: pointer;
}
.accept-charges-row label {
  font-size: 13px; color: var(--gray-700); cursor: pointer; user-select: none;
}

/* === Delete sub-user button === */
.delete-subuser-btn {
  background: none; border: none; cursor: pointer; color: var(--gray-500); padding: 4px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 4px; transition: all .2s;
}
.delete-subuser-btn:hover { color: var(--red); background: #fee2e2; }
.delete-subuser-btn svg { width: 16px; height: 16px; }

/* === Phone with country code === */
.phone-with-code {
  display: flex; gap: 8px; align-items: stretch;
}
.phone-with-code select {
  width: 120px; flex-shrink: 0; border: 1.5px solid var(--gray-200); border-radius: 8px;
  padding: 8px 6px; font-size: 13px; outline: none; background: #fff;
}
.phone-with-code select:focus { border-color: var(--coral); }
.phone-with-code input { flex: 1; }

/* === Recharge row alignment === */
.recharge-row {
  display: flex; gap: 12px; align-items: stretch;
}
.recharge-row .form-group {
  flex: 1; margin-bottom: 0;
}
.recharge-row .form-group select {
  height: 100%;
}
.recharge-row .btn {
  align-self: stretch;
  height: auto;
  padding: 12px 24px;
}

/* === MOBILE MENU TOGGLE === */
.mobile-menu-toggle {
  display: none; position: fixed; top: 12px; left: 12px; z-index: 200;
  background: var(--navy); color: #fff; border: none; border-radius: 8px;
  padding: 8px 12px; font-size: 20px; cursor: pointer; line-height: 1;
}
.sidebar-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,.5); z-index: 90;
}

@media (max-width: 900px) {
  .mobile-menu-toggle { display: block; }
  .sidebar-overlay.active { display: block; }
  .sidebar {
    transform: translateX(-100%); transition: transform .3s ease; z-index: 150;
  }
  .sidebar.open { transform: translateX(0); }
  .main-content { margin-left: 0 !important; padding: 20px 16px !important; padding-top: 56px !important; }
  .sim-info-grid { grid-template-columns: 1fr; }
  .sim-info-section:nth-child(odd) { padding-right: 0; border-right: none; border-bottom: 1px solid var(--gray-100); }
  .sim-info-section:nth-child(even) { padding-left: 0; }
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .sim-assign-grid { grid-template-columns: 1fr; }
  .my-account-grid { grid-template-columns: 1fr; }
  .modal { max-width: 95vw; margin: 10px; padding: 20px; }
  .page-header h1 { font-size: 22px; }
  table { font-size: 13px; }
  th, td { padding: 8px 10px; }
  .recharge-row { flex-direction: column; }
  .phone-with-code { flex-direction: column; }
  .phone-with-code select { width: 100%; }
  .search-bar { flex-direction: column; }
  .search-bar input { min-width: unset; }
  .sim-actions-bar { flex-direction: column; }
  .sim-actions-bar .btn { width: 100%; justify-content: center; }
  .sim-activate-deactivate-bar { flex-direction: column; }
  .login-box { margin: 16px; padding: 32px 24px; }
}

@media (max-width: 480px) {
  .stats-grid { grid-template-columns: 1fr; }
  .stat-card .stat-value { font-size: 24px; }
  .page-header h1 { font-size: 20px; }
}
</style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="loginPage">
  <div class="login-box">
    <div class="login-logo">
      <img src="/logo.png" alt="SkyConnect" style="max-width:200px;max-height:80px" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
      <svg viewBox="0 0 600 100" xmlns="http://www.w3.org/2000/svg" style="display:none;width:200px">
        <text x="10" y="70" font-family="Arial Black, Arial" font-weight="900" font-size="60" fill="#0d2137">SKYC</text>
        <circle cx="265" cy="52" r="28" fill="#e63956"/>
        <text x="252" y="70" font-family="Arial Black, Arial" font-weight="900" font-size="60" fill="white">O</text>
        <text x="290" y="70" font-family="Arial Black, Arial" font-weight="900" font-size="60" fill="#0d2137">NNECT</text>
        <text x="10" y="92" font-family="Arial" font-size="14" fill="#6b7a8d" letter-spacing="6">SATELLITE SERVICES</text>
      </svg>
    </div>
    <p class="login-subtitle">Plataforma de Gesti&oacute;n de SIM Satelitales</p>
    <form onsubmit="doLogin(event)">
      <div class="form-group">
        <label>USUARIO</label>
        <input type="text" id="loginEmail" required placeholder="Ingrese su usuario">
      </div>
      <div class="form-group">
        <label>Contrase&ntilde;a</label>
        <div class="password-wrapper">
          <input type="password" id="loginPass" required placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;">
          <button type="button" class="password-toggle" onclick="togglePasswordVisibility()" id="passToggle" title="Mostrar contrase&ntilde;a"><svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg></button>
        </div>
      </div>
      <button type="submit" class="btn btn-coral btn-full" id="loginBtn">Iniciar Sesi&oacute;n</button>
      <p class="login-error" id="loginError"></p>
    </form>
  </div>
</div>

<!-- APP PAGE -->
<div id="appPage">
  <button class="mobile-menu-toggle" id="mobileMenuToggle" onclick="toggleMobileMenu()">&#9776;</button>
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleMobileMenu()"></div>
  <div class="app-layout">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-logo">
        <img src="/logo-light.png" alt="SkyConnect" style="max-width:160px;max-height:60px" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
        <svg viewBox="0 0 500 80" xmlns="http://www.w3.org/2000/svg" style="display:none;width:160px">
          <text x="5" y="55" font-family="Arial Black, Arial" font-weight="900" font-size="44" fill="white">SKYC</text>
          <circle cx="200" cy="38" r="20" fill="#e63956"/>
          <text x="190" y="52" font-family="Arial Black, Arial" font-weight="900" font-size="44" fill="white">O</text>
          <text x="220" y="55" font-family="Arial Black, Arial" font-weight="900" font-size="44" fill="white">NNECT</text>
          <text x="5" y="72" font-family="Arial" font-size="11" fill="rgba(255,255,255,.5)" letter-spacing="5">SATELLITE SERVICES</text>
        </svg>
      </div>
      <div class="sidebar-slogan">Anywhere. Anytime.</div>
      <nav class="sidebar-nav">
        <div class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Dashboard
          <span class="nav-dot"></span>

// === App State ===
let currentUser = null;
let currentPage = 'dashboard';
let planData = null;

// === Init ===
(async function init() {
  try {
    const res = await fetch('/api/me');
    if (res.ok) {
      currentUser = await res.json();
      if (currentUser.role === 'admin') {
        window.location.href = '/admin';
        return;
      }
      showApp();
    }
  } catch (e) {}
})();

// === Password Toggle ===
function togglePasswordVisibility() {
  const inp = document.getElementById('loginPass');
  const btn = document.getElementById('passToggle');
  if (inp.type === 'password') {
    inp.type = 'text';
    btn.innerHTML = SVG_EYE_CLOSED;
    btn.title = 'Ocultar contrasena';
  } else {
    inp.type = 'password';
    btn.innerHTML = SVG_EYE_OPEN;
    btn.title = 'Mostrar contrasena';
  }
}

// === Auth ===
async function doLogin(e) {
  e.preventDefault();
  const email = document.getElementById('loginEmail').value;
  const pass = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginError');
  errEl.style.display = 'none';
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pass })
    });
    const data = await res.json();
    if (!res.ok) {
      errEl.textContent = data.error || 'Error al iniciar sesion';
      errEl.style.display = 'block';
      return;
    }
    currentUser = data;
    if (data.role === 'admin') { window.location.href = '/admin'; return; }
    showApp();
  } catch (err) {
    errEl.textContent = 'Error de conexion';
    errEl.style.display = 'block';
  }
}

async function doLogout() {
  await fetch('/api/logout', { method: 'POST' });
  currentUser = null;
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('appPage').style.display = 'none';
}

function showApp() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('appPage').style.display = 'block';
  document.getElementById('userName').textContent = currentUser.name;
  document.getElementById('userCompany').textContent = currentUser.company;
  navigate('dashboard');
}

// === Navigation ===
function navigate(page, param) {
  // Close mobile menu on navigate
  const sidebar = document.querySelector('#appPage .sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  if (sidebar) { sidebar.classList.remove('open'); }
  if (overlay) { overlay.classList.remove('active'); }
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const navItem = document.querySelector(`.nav-item[data-page="${page}"]`);
  if (navItem) navItem.classList.add('active');
  render(param);
}

async function render(param) {
  const main = document.getElementById('mainContent');
  try {
    switch (currentPage) {
      case 'dashboard': await renderDashboard(main); break;
      case 'sims': await renderSims(main); break;
      case 'simDetail': await renderSimDetail(main, param); break;
      case 'accounts': await renderAccounts(main); break;
      case 'reports': renderReports(main); break;
      case 'billing': renderBilling(main); break;
      case 'subusers': await renderSubUsers(main); break;
      case 'myaccount': renderMyAccount(main); break;
    }
  } catch (err) {
    main.innerHTML = '<div class="card"><p>Error al cargar datos</p></div>';
  }
}

// === Helper: format ISDN (remove + and spaces) ===
function formatISDN(msisdn) {
  if (!msisdn) return '';
  return msisdn.replace(/[\s+]/g, '');
}

// === Helper: render operations table ===
function renderOperationsTable(operations) {
  if (!operations || operations.length === 0) {
    return `<p style="color:var(--gray-500);padding:16px 0">No hay operaciones recientes</p>`;
  }
  const recent = operations.slice(-3).reverse();
  return `
    <table>
      <thead><tr><th>Operaci&oacute;n</th><th>Fecha</th><th>Estado</th></tr></thead>
      <tbody>
        ${recent.map(op => {
          let badgeClass = 'badge-op-proceso';
          let label = 'En proceso';
          if (op.status === 'completed' || op.status === 'success' || op.status === 'Exitosa') { badgeClass = 'badge-op-exitosa'; label = 'Exitosa'; }
          else if (op.status === 'failed' || op.status === 'Fallida') { badgeClass = 'badge-op-fallida'; label = 'Fallida'; }
          else if (op.status === 'pending' || op.status === 'En proceso') { badgeClass = 'badge-op-proceso'; label = 'En proceso'; }
          else { badgeClass = 'badge-op-proceso'; label = 'En proceso'; }
          return `
            <tr style="cursor:default">
              <td>${op.type || op.operation || '—'}</td>
              <td>${formatDate(op.date || op.createdAt)}</td>
              <td><span class="badge ${badgeClass}">${label}</span></td>
            </tr>
          `;
        }).join('')}
      </tbody>
    </table>
  `;
}

// === SIM name inline edit ===
function enableSimNameEdit(simId) {
  const display = document.getElementById('simNameDisplay');
  const currentName = display.textContent;
  display.outerHTML = `<input class="sim-profile-name-input" id="simNameInput" value="${currentName}" onblur="saveSimName('${simId}')" onkeydown="if(event.key==='Enter')this.blur()">`;
  document.getElementById('simNameInput').focus();
}

async function saveSimName(simId) {
  const input = document.getElementById('simNameInput');
  if (!input) return;
  const newName = input.value.trim();
  if (newName) {
    const res = await fetch(`/api/sims/${simId}/assign`, {
      method: 'PATCH', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: newName })
    });
    if (res.ok) toast('Nombre actualizado', 'success');
  }
  input.outerHTML = `<h2 id="simNameDisplay">${newName || simId}</h2>`;
}

// === Toggle activation/recharge buttons based on checkbox ===
function toggleActivateBtn() {
  const cb = document.getElementById('inlineActAccept');
  const btn = document.getElementById('inlineActBtn');
  if (cb && btn) {
    if (cb.checked) { btn.classList.remove('btn-disabled'); btn.disabled = false; }
    else { btn.classList.add('btn-disabled'); btn.disabled = true; }
  }
}

function toggleRechargeBtn() {
  const cb = document.getElementById('rechargeAccept');
  const btn = document.getElementById('rechargeBtn');
  if (cb && btn) {
    if (cb.checked) { btn.classList.remove('btn-disabled'); btn.disabled = false; }
    else { btn.classList.add('btn-disabled'); btn.disabled = true; }
  }
}

// === Inline activate (for inactive SIM page) ===
function updateInlinePlanOptions() {
  const service = document.getElementById('inlineActService').value;
  const planSel = document.getElementById('inlineActPlan');
  if (!service || !planData) { planSel.innerHTML = '<option value="">— Seleccione servicio primero —</option>'; planSel.disabled = true; return; }
  const plans = planData.plans[service] || [];
  planSel.innerHTML = '<option value="">— Seleccionar plan —</option>' + plans.map(p => `<option value="${p}">${p}</option>`).join('');
  planSel.disabled = false;
}

async function doInlineActivate(simId) {
  const cb = document.getElementById('inlineActAccept');
  if (!cb || !cb.checked) return toast('Debe aceptar los cargos para continuar', 'error');
  const serviceType = document.getElementById('inlineActService').value;
  const planType = document.getElementById('inlineActPlan').value;
  if (!serviceType || !planType) return toast('Seleccione servicio y plan', 'error');
  const res = await fetch(`/api/sims/${simId}/activate`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ serviceType, planType, activationType: 'immediate' })
  });
  if (res.ok) { toast('Solicitud de activacion enviada', 'success'); navigate('simDetail', simId); }
  else { const d = await res.json(); toast(d.error || 'Error', 'error'); }
}

async function doInlineRecharge(simId) {
  const cb = document.getElementById('rechargeAccept');
  if (!cb || !cb.checked) return toast('Debe aceptar los cargos para continuar', 'error');
  const plan = document.getElementById('inlineRechargePlan').value;
  if (!plan) return toast('Seleccione un plan', 'error');
  const res = await fetch(`/api/sims/${simId}/recharge`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ plan })
  });
  if (res.ok) { toast('Recarga en proceso', 'success'); navigate('simDetail', simId); }
  else { const d = await res.json(); toast(d.error || 'Error', 'error'); }
}

async function doCreateAccount() {
  const name = document.getElementById('accName').value.trim();
  const contact = document.getElementById('accContact').value.trim();
  if (!name) return toast('Cuenta/Cliente es requerido', 'error');
  try {
    const res = await fetch('/api/accounts', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, contact })
    });
    if (res.ok) {
      toast('Cuenta creada exitosamente', 'success');
      closeModal();
      navigate('accounts');
    } else {
      const d = await res.json();
      toast(d.error || 'Error al crear cuenta', 'error');

async function requestDeleteAccount(accountId, accountName) {
  if (!confirm('¿Solicitar eliminación de la cuenta "' + accountName + '"? Un administrador debe aprobar esta solicitud.')) return;

    if (res.ok) {
      toast('Solicitud de eliminación enviada al administrador', 'success');

  const planSel = document.getElementById('actPlan');
  if (!service) { planSel.innerHTML = '<option value="">— Seleccione servicio primero —</option>'; planSel.disabled = true; return; }
  const plans = planData.plans[service] || [];
  planSel.innerHTML = '<option value="">— Seleccionar plan —</option>' + plans.map(p => `<option value="${p}">${p}</option>`).join('');
  planSel.disabled = false;
}

async function doActivate(simId) {
  const cb = document.getElementById('modalActAccept');
  if (!cb || !cb.checked) return toast('Debe aceptar los cargos para continuar', 'error');
  const serviceType = document.getElementById('actService').value;
  const planType = document.getElementById('actPlan').value;
  const activationType = document.getElementById('actType').value;
  const scheduledDate = document.getElementById('actDate')?.value || '';
  if (!serviceType || !planType) return toast('Seleccione servicio y plan', 'error');
  const res = await fetch(`/api/sims/${simId}/activate`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ serviceType, planType, activationType, scheduledDate })
  });
  if (res.ok) { closeModal(); toast('Solicitud de activacion enviada', 'success'); navigate('simDetail', simId); }
  else { const d = await res.json(); toast(d.error || 'Error', 'error'); }
}

function confirmDeactivate(simId) {
  const mc = document.getElementById('modalContainer');
  mc.innerHTML = `
    <div class="modal-overlay" onclick="closeModal(event)">
      <div class="modal" onclick="event.stopPropagation()">
        <h2>Desactivar Dispositivo</h2>
        <p style="margin-bottom:16px;color:var(--gray-500)">&iquest;Est&aacute; seguro que desea desactivar este dispositivo? Esta acci&oacute;n ser&aacute; procesada por nuestro equipo.</p>
        <div class="modal-actions">
          <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
          <button class="btn btn-red" onclick="doDeactivate('${simId}')">S&iacute;, Desactivar</button>
        </div>
      </div>
    </div>
  `;
}

async function doDeactivate(simId) {
  const res = await fetch(`/api/sims/${simId}/deactivate`, { method: 'POST' });
  if (res.ok) { closeModal(); toast('Solicitud de desactivacion enviada', 'success'); navigate('simDetail', simId); }
}

async function requestBalanceUpdate(simId) {
  const res = await fetch(`/api/sims/${simId}/refresh-balance`, { method: 'POST' });
  if (res.ok) toast('Se ha solicitado la actualizacion del saldo', 'info');
}

function showRechargeModal(simId, serviceType) {
  if (!planData) return toast('Cargando...', 'info');
  const plans = planData.plans[serviceType] || planData.plans['Pre-Pago'];
  const mc = document.getElementById('modalContainer');
  mc.innerHTML = `
    <div class="modal-overlay" onclick="closeModal(event)">
      <div class="modal" onclick="event.stopPropagation()">
        <h2>Recargar Dispositivo</h2>
        <div class="form-group">
          <label>Plan de Recarga</label>
          <select id="rechargePlan">
            <option value="">— Seleccionar plan —</option>
            ${plans.map(p => `<option value="${p}">${p}</option>`).join('')}
          </select>
        </div>
        <div class="modal-actions">
          <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
          <button class="btn btn-coral" onclick="doRecharge('${simId}')">Recargar</button>
        </div>
      </div>
    </div>
  `;
}

async function doRecharge(simId) {
  const plan = document.getElementById('rechargePlan').value;
  if (!plan) return toast('Seleccione un plan', 'error');
  const res = await fetch(`/api/sims/${simId}/recharge`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ plan })
  });
  if (res.ok) { closeModal(); toast('Recarga en proceso', 'success'); }
}

async function saveAssignment(simId) {
  const subClient = document.getElementById('assignSub').value;
  const res = await fetch(`/api/sims/${simId}/assign`, {
    method: 'PATCH', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ subClient })
  });
  if (res.ok) toast('Informacion guardada', 'success');
}

function showNewSubUserModal() {
  const mc = document.getElementById('modalContainer');
  mc.innerHTML = `
    <div class="modal-overlay" onclick="closeModal(event)">
      <div class="modal" onclick="event.stopPropagation()">
        <h2>Nuevo Sub-Usuario</h2>
        <div class="form-group"><label>Empresa</label><input id="suEmpresa" placeholder="Nombre de la empresa"></div>
        <div class="form-group"><label>Nombre</label><input id="suName" placeholder="Nombre completo"></div>
        <div class="form-group"><label>Email *</label><input id="suEmail" type="email" required placeholder="email@empresa.com"></div>
        <div class="modal-actions">
          <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
          <button class="btn btn-coral" onclick="doCreateSubUser()">Solicitar</button>
        </div>
      </div>
    </div>
  `;
}

async function doCreateSubUser() {
  const empresa = document.getElementById('suEmpresa').value;
  const name = document.getElementById('suName').value;
  const email = document.getElementById('suEmail').value;
  if (!name || !email) return toast('Nombre y email son requeridos', 'error');
  const res = await fetch('/api/subusers', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, email, empresa })
  });
  if (res.ok) { closeModal(); toast('Solicitud de sub-usuario enviada. Pendiente de aprobacion.', 'success'); navigate('subusers'); }
}

// === Helpers ===
function closeModal(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('modalContainer').innerHTML = '';
}

function toast(msg, type = 'success') {
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

function statusLabel(s) {
  const m = { active: 'Activa', inactive: 'Inactiva', processing: 'Procesando', pending: 'Pendiente', approved: 'Aprobado', rejected: 'Rechazado' };
  return m[s] || s;
}

function formatDate(d) {
  if (!d) return '—';
  try { return new Date(d).toLocaleDateString('es-ES', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }); }
  catch (e) { return d; }
}
</script>
