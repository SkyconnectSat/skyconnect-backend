<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyConnect Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --navy: #0d2137; --navy-light: #142d4a; --coral: #e63956; --coral-hover: #d42e4a;
  --gray-50: #f8f9fb; --gray-100: #eef1f5; --gray-200: #dde2ea; --gray-300: #b8c1ce;
  --gray-500: #6b7a8d; --gray-700: #374151;
  --green: #10b981; --amber: #f59e0b; --red: #ef4444; --blue: #3b82f6;
}
body { font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--gray-50); color: var(--gray-700); }
h1, h2, h3, .page-header h1, .card-header h2, .stat-card .value, .sidebar-logo h2 { font-family: 'League Spartan', sans-serif; }

.app-layout { display: flex; min-height: 100vh; }
.sidebar {
  width: 250px; background: var(--navy-light); color: #fff; padding: 24px 0;
  display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0;
}
.sidebar-logo { padding: 12px 24px 20px; border-bottom: 1px solid rgba(255,255,255,.1); text-align: center; }
.sidebar-logo h2 { font-size: 18px; color: var(--coral); }
.sidebar-logo span { font-size: 11px; color: rgba(255,255,255,.4); }
.sidebar-nav { flex: 1; padding: 16px 0; overflow-y: auto; }
.nav-item {
  display: flex; align-items: center; gap: 10px; padding: 11px 24px;
  color: rgba(255,255,255,.6); cursor: pointer; transition: all .2s; font-size: 14px;
}
.nav-item:hover { color: #fff; background: rgba(255,255,255,.05); }
.nav-item.active { color: #fff; background: rgba(255,255,255,.1); border-left: 3px solid var(--coral); }
.nav-icon { display: inline-flex; align-items: center; width: 18px; height: 18px; flex-shrink: 0; }
.nav-icon svg { width: 18px; height: 18px; }
.sidebar-footer { padding: 16px 24px; border-top: 1px solid rgba(255,255,255,.1); }
.btn-logout { width: 100%; padding: 8px; border-radius: 8px; background: rgba(255,255,255,.1); color: rgba(255,255,255,.7); border: none; cursor: pointer; font-size: 13px; }
.btn-logout:hover { background: rgba(255,255,255,.15); color: #fff; }

.main-content { margin-left: 250px; flex: 1; padding: 28px; }
.page-header { margin-bottom: 24px; }
.page-header h1 { font-size: 24px; color: var(--navy); }
.page-header p { color: var(--gray-500); font-size: 14px; margin-top: 4px; }

.card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.06); border: 1px solid var(--gray-100); margin-bottom: 16px; }
.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.card-header h2 { font-size: 16px; color: var(--navy); }

.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
.stat-card { background: #fff; border-radius: 10px; padding: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.06); border: 1px solid var(--gray-100); }
.stat-card .label { font-size: 12px; color: var(--gray-500); text-transform: uppercase; letter-spacing: .5px; }
.stat-card .value { font-size: 28px; font-weight: 700; color: var(--navy); margin-top: 2px; }

table { width: 100%; border-collapse: collapse; }
th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--gray-500); padding: 10px 12px; border-bottom: 2px solid var(--gray-100); }
td { padding: 10px 12px; border-bottom: 1px solid var(--gray-100); font-size: 13px; }
tr:hover td { background: var(--gray-50); }

.badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.badge-active { background: #d1fae5; color: #065f46; }
.badge-inactive { background: var(--gray-100); color: var(--gray-500); }
.badge-processing { background: #fef3c7; color: #92400e; }
.badge-pending { background: #dbeafe; color: #1e40af; }
.badge-approved { background: #d1fae5; color: #065f46; }
.badge-rejected { background: #fee2e2; color: #991b1b; }
.badge-completed { background: #d1fae5; color: #065f46; }

.btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; border: none; cursor: pointer; transition: all .15s; }
.btn-coral { background: var(--coral); color: #fff; }
.btn-coral:hover { background: var(--coral-hover); }
.btn-green { background: var(--green); color: #fff; }
.btn-green:hover { opacity: .9; }
.btn-red { background: var(--red); color: #fff; }
.btn-red:hover { opacity: .9; }
.btn-outline { background: transparent; border: 1px solid var(--gray-200); color: var(--gray-700); }
.btn-outline:hover { border-color: var(--coral); color: var(--coral); }
.btn-navy { background: var(--navy); color: #fff; }
.btn-sm { padding: 5px 10px; font-size: 12px; }

.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--gray-500); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .3px; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%; padding: 9px 12px; border: 1.5px solid var(--gray-200); border-radius: 8px; font-size: 14px; outline: none; background: #fff;
}
.form-group input:focus, .form-group select:focus { border-color: var(--coral); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.phone-row { display: grid; grid-template-columns: 200px 1fr; gap: 8px; }

.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.5);
  display: flex; align-items: center; justify-content: center; z-index: 1000;
}
.modal { background: #fff; border-radius: 14px; padding: 28px; width: 100%; max-width: 600px; max-height: 85vh; overflow-y: auto; }
.modal h2 { font-size: 18px; color: var(--navy); margin-bottom: 16px; }
.modal-actions { display: flex; gap: 10px; margin-top: 20px; }
.modal-actions .btn { flex: 1; padding: 10px; }

.toast {
  position: fixed; bottom: 20px; right: 20px; padding: 14px 20px; border-radius: 10px;
  color: #fff; font-size: 14px; z-index: 2000; animation: slideIn .3s;
}
.toast-success { background: var(--green); }
.toast-error { background: var(--red); }
.toast-info { background: var(--blue); }
@keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

.request-card { border: 1px solid var(--gray-200); border-radius: 10px; padding: 16px; margin-bottom: 12px; }
.request-card.urgent { border-left: 4px solid var(--coral); }
.request-meta { display: flex; gap: 16px; flex-wrap: wrap; margin: 8px 0; font-size: 13px; color: var(--gray-500); }
.request-actions { display: flex; gap: 8px; margin-top: 10px; }

.plan-category { border: 1px solid var(--gray-200); border-radius: 10px; padding: 16px; margin-bottom: 16px; }
.plan-category-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.plan-category-header h3 { font-size: 15px; color: var(--navy); }
.plan-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: var(--gray-50); border-radius: 6px; margin-bottom: 6px; font-size: 13px; }
.plan-item button { background: none; border: none; color: var(--red); cursor: pointer; font-size: 16px; font-weight: bold; }
.btn-header-group { display: flex; gap: 8px; align-items: center; }

/* Country code dropdown */
.cc-dropdown-wrapper { position: relative; }
.cc-dropdown-trigger {
  display: flex; align-items: center; gap: 6px; padding: 9px 12px; border: 1.5px solid var(--gray-200);
  border-radius: 8px; font-size: 14px; background: #fff; cursor: pointer; min-width: 160px; justify-content: space-between;
}
.cc-dropdown-trigger:focus-within, .cc-dropdown-trigger.open { border-color: var(--coral); }
.cc-dropdown-panel {
  position: absolute; top: 100%; left: 0; right: 0; background: #fff; border: 1.5px solid var(--gray-200);
  border-radius: 8px; margin-top: 4px; z-index: 100; max-height: 240px; overflow: hidden; display: flex; flex-direction: column;
  box-shadow: 0 8px 24px rgba(0,0,0,.12);
}
.cc-dropdown-search {
  padding: 8px 10px; border: none; border-bottom: 1px solid var(--gray-100); font-size: 13px; outline: none; flex-shrink: 0;
}
.cc-dropdown-list { overflow-y: auto; flex: 1; }
.cc-dropdown-item {
  display: flex; align-items: center; gap: 8px; padding: 8px 12px; font-size: 13px; cursor: pointer;
}
.cc-dropdown-item:hover { background: var(--gray-50); }
.cc-dropdown-item.selected { background: var(--gray-100); font-weight: 600; }

/* Toggle switch */
.toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--gray-100); }
.toggle-row label { font-size: 14px; color: var(--gray-700); font-weight: 500; text-transform: none; letter-spacing: 0; }
.toggle-switch { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
.toggle-switch input { opacity: 0; width: 0; height: 0; }
.toggle-slider {
  position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
  background: var(--gray-200); border-radius: 24px; transition: .3s;
}
.toggle-slider:before {
  position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px;
  background: #fff; border-radius: 50%; transition: .3s;
}
.toggle-switch input:checked + .toggle-slider { background: var(--green); }
.toggle-switch input:checked + .toggle-slider:before { transform: translateX(20px); }

.add-plan-row { display: flex; gap: 8px; margin-top: 8px; }
.add-plan-row input { flex: 1; padding: 7px 10px; border: 1.5px solid var(--gray-200); border-radius: 6px; font-size: 13px; outline: none; }
.add-plan-row input:focus { border-color: var(--coral); }

/* Search / filter bar */
.filter-bar { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.filter-bar input, .filter-bar select { padding: 8px 12px; border: 1.5px solid var(--gray-200); border-radius: 8px; font-size: 13px; outline: none; background: #fff; }
.filter-bar input:focus, .filter-bar select:focus { border-color: var(--coral); }
.filter-bar input { min-width: 260px; }
.filter-bar select { min-width: 180px; }

/* Permissions checkboxes */
.perm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
.perm-item { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--gray-50); border-radius: 8px; }
.perm-item input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--coral); }
.perm-item label { font-size: 13px; color: var(--gray-700); font-weight: 500; text-transform: none; letter-spacing: 0; cursor: pointer; }

/* Email template editor */
.template-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.template-card {
  border: 1px solid var(--gray-200); border-radius: 10px; padding: 16px;
  display: flex; justify-content: space-between; align-items: center;
}
.template-card-info h4 { font-size: 14px; color: var(--navy); margin-bottom: 4px; }
.template-card-info p { font-size: 12px; color: var(--gray-500); margin: 0; }
.template-editor { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px; }
.template-textarea {
  width: 100%; min-height: 400px; font-family: 'Courier New', monospace; font-size: 13px;
  border: 1.5px solid var(--gray-200); border-radius: 8px; padding: 12px; outline: none;
  resize: vertical; line-height: 1.5;
}
.template-textarea:focus { border-color: var(--coral); }
.template-preview {
  border: 1.5px solid var(--gray-200); border-radius: 8px; background: #fff;
  min-height: 400px; overflow: auto; padding: 0;
}
.template-preview iframe { width: 100%; min-height: 400px; border: none; }
.template-vars {
  margin-top: 12px; padding: 12px; background: var(--gray-50); border-radius: 8px;
  font-size: 12px; color: var(--gray-500);
}
.template-vars code {
  display: inline-block; background: var(--gray-100); padding: 2px 6px;
  border-radius: 4px; font-size: 11px; margin: 2px; color: var(--navy);
}
.modal-wide { max-width: 900px; }
/* === MOBILE RESPONSIVE === */
.mobile-menu-toggle {
  display: none; position: fixed; top: 12px; left: 12px; z-index: 200;
  background: var(--navy); color: #fff; border: none; border-radius: 8px;
  padding: 8px 12px; font-size: 20px; cursor: pointer; line-height: 1;
}
.sidebar-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,.5); z-index: 90;
}
@media (max-width: 900px) {
  .mobile-menu-toggle { display: block; }
  .sidebar-overlay.active { display: block; }
  .sidebar {
    transform: translateX(-100%); transition: transform .3s ease; z-index: 150;
  }
  .sidebar.open { transform: translateX(0); }
  .main-content { margin-left: 0 !important; padding: 16px !important; padding-top: 56px !important; }
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .form-row { grid-template-columns: 1fr; }
  .form-row-3 { grid-template-columns: 1fr; }
  .template-grid { grid-template-columns: 1fr; }
  .template-editor { grid-template-columns: 1fr; }
  .modal { max-width: 95vw; margin: 10px; padding: 20px; }
  .modal-wide { max-width: 95vw; }
  .perm-grid { grid-template-columns: 1fr; }
  .filter-bar { flex-direction: column; }
  .filter-bar input, .filter-bar select { min-width: unset; width: 100%; }
  table { display: block; overflow-x: auto; }
  th, td { padding: 8px 10px; white-space: nowrap; }
  .page-header h1 { font-size: 20px; }
  .request-card { padding: 12px; }
  .request-meta { flex-direction: column; gap: 4px; }
  .request-actions { flex-wrap: wrap; }
  .phone-row { grid-template-columns: 1fr; }
}
@media (max-width: 480px) {
  .stats-grid { grid-template-columns: 1fr; }
  .stat-card .value { font-size: 22px; }
}
</style>
</head>
<body>
<div class="app-layout">
  <button class="mobile-menu-toggle" onclick="toggleMobileMenu()">&#9776;</button>
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleMobileMenu()"></div>
  <div class="sidebar">
    <div class="sidebar-logo">
      <h2>SKYCONNECT</h2>

        Sub-Usuarios
      </div>
      <div class="nav-item" data-page="airtime" onclick="navTo('airtime')">
        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></span>
        Airtime
      </div>
      <div class="nav-item" data-page="activity" onclick="navTo('activity')">
        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></span>
        Actividad
      </div>
      <div class="nav-item" data-page="branding" onclick="navTo('branding')">
        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></span>
        Logo / Marca
      </div>
      <div class="nav-item" data-page="notifications" onclick="navTo('notifications')">
        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></span>
        Notificaciones
      </div>
    </nav>
    <div class="sidebar-footer">
      <button class="btn-logout" onclick="logout()">Cerrar Sesion</button>
    </div>
  </div>

  <div class="main-content" id="main"></div>
</div>
<div id="modalContainer"></div>

<script>
let page = 'requests';

function toggleMobileMenu() {
  document.querySelector('.sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('active');
}

// All countries of the world (195+ countries, sorted alphabetically)

];

// Comprehensive country codes list
const COUNTRY_CODES = [
  { code: '+1', country: 'Estados Unidos', flag: '\u{1F1FA}\u{1F1F8}' },
  { code: '+1', country: 'Canada', flag: '\u{1F1E8}\u{1F1E6}' },

// Cached plans data for use across modules
let cachedPlansData = null;

async function fetchPlansData() {
  cachedPlansData = await api('/api/admin/plans');
  return cachedPlansData;
}

function renderCountryCodeDropdown(inputId, selectedCode) {
  const sel = selectedCode || '+1';
  const match = COUNTRY_CODES.find(c => c.code === sel) || COUNTRY_CODES[0];
  return `
    <div class="cc-dropdown-wrapper" id="${inputId}_wrapper">
      <input type="hidden" id="${inputId}" value="${sel}">
      <div class="cc-dropdown-trigger" onclick="toggleCCDropdown('${inputId}')" id="${inputId}_trigger">
        <span id="${inputId}_display">${match.flag} ${match.code} ${match.country}</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="cc-dropdown-panel" id="${inputId}_panel" style="display:none">
        <input class="cc-dropdown-search" placeholder="Buscar pais..." oninput="filterCCDropdown('${inputId}', this.value)" autocomplete="off">
        <div class="cc-dropdown-list" id="${inputId}_list"></div>
      </div>
    </div>
  `;
}

function toggleCCDropdown(inputId) {
  const panel = document.getElementById(inputId + '_panel');
  const trigger = document.getElementById(inputId + '_trigger');
  const isOpen = panel.style.display !== 'none';
  // close all other dropdowns first
  document.querySelectorAll('.cc-dropdown-panel').forEach(p => { p.style.display = 'none'; });
  document.querySelectorAll('.cc-dropdown-trigger').forEach(t => { t.classList.remove('open'); });
  if (!isOpen) {
    panel.style.display = 'flex';
    trigger.classList.add('open');
    const searchInput = panel.querySelector('.cc-dropdown-search');
    searchInput.value = '';
    searchInput.focus();
    populateCCList(inputId, '');
  }
}

function populateCCList(inputId, filter) {
  const list = document.getElementById(inputId + '_list');
  const currentVal = document.getElementById(inputId).value;
  const lf = filter.toLowerCase();
  const filtered = COUNTRY_CODES.filter(c =>
    c.country.toLowerCase().includes(lf) || c.code.includes(lf)
  );
  list.innerHTML = filtered.map(c => `
    <div class="cc-dropdown-item${c.code === currentVal ? ' selected' : ''}" onclick="selectCC('${inputId}', '${c.code}', '${c.flag}', '${c.country}')">
      ${c.flag} <span style="min-width:50px;display:inline-block">${c.code}</span> ${c.country}
    </div>
  `).join('');
}

function filterCCDropdown(inputId, value) {
  populateCCList(inputId, value);
}

function selectCC(inputId, code, flag, country) {
  document.getElementById(inputId).value = code;
  document.getElementById(inputId + '_display').textContent = flag + ' ' + code + ' ' + country;
  document.getElementById(inputId + '_panel').style.display = 'none';
  document.getElementById(inputId + '_trigger').classList.remove('open');
}

// Close dropdowns on outside click
document.addEventListener('click', function(e) {
  if (!e.target.closest('.cc-dropdown-wrapper')) {
    document.querySelectorAll('.cc-dropdown-panel').forEach(p => { p.style.display = 'none'; });
    document.querySelectorAll('.cc-dropdown-trigger').forEach(t => { t.classList.remove('open'); });
  }
});

function formatMadrid(dateStr) {
  if (!dateStr) return '—';
  return new Date(dateStr).toLocaleString('es-ES', { timeZone: 'Europe/Madrid' });
}

function formatMadridDate(dateStr) {
  if (!dateStr) return '—';
  return new Date(dateStr).toLocaleDateString('es-ES', { timeZone: 'Europe/Madrid' });
}

async function api(url, opts) {
  const r = await fetch(url, { headers: { 'Content-Type': 'application/json' }, ...opts });
  if (r.status === 401) { window.location.href = '/'; return null; }
  return r.json();
}

function navTo(p) {
  page = p;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.page === p));
  // Close mobile menu
  document.querySelector('.sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('active');
  render();
}

async function render() {
  const m = document.getElementById('main');
  switch (page) {
    case 'requests': await renderRequests(m); break;
    case 'sims': await renderSims(m); break;
    case 'accounts': await renderAccounts(m); break;
    case 'users': await renderUsers(m); break;
    case 'subusers': await renderSubUsers(m); break;
    case 'airtime': await renderAirtime(m); break;
    case 'branding': await renderBranding(m); break;
    case 'activity': await renderActivity(m); break;
    case 'notifications': await renderNotifications(m); break;
  }
}

// === REQUESTS ===
async function renderRequests(el) {
  const [reqs, subs] = await Promise.all([
    api('/api/admin/requests'),
    api('/api/subusers')
  ]);
  if (!reqs) return;
  const pending = reqs.filter(r => r.status === 'pending');
  const completed = reqs.filter(r => r.status !== 'pending');
  const pendingSubs = (subs || []).filter(s => s.status === 'pending');

  const typeLabel = { activation: 'Activacion', deactivation: 'Desactivacion', recharge: 'Recarga', balance_update: 'Actualizar Saldo', account_creation: 'Creacion de Cuenta', subuser_approval: 'Aprobacion Sub-Usuario' };

  const totalPending = pending.length + pendingSubs.length;

  el.innerHTML = `
    <div class="page-header"><h1>Solicitudes</h1><p>${totalPending} pendientes</p></div>
    <div class="stats-grid">
      <div class="stat-card"><div class="label">Pendientes</div><div class="value" style="color:var(--amber)">${totalPending}</div></div>
      <div class="stat-card"><div class="label">Sub-Usuarios Pend.</div><div class="value" style="color:var(--blue)">${pendingSubs.length}</div></div>
      <div class="stat-card"><div class="label">Completadas</div><div class="value" style="color:var(--green)">${completed.filter(r=>r.status==='completed').length}</div></div>
      <div class="stat-card"><div class="label">Total</div><div class="value">${reqs.length}</div></div>
    </div>
    ${pendingSubs.length > 0 ? `<div class="card"><div class="card-header"><h2>Sub-Usuarios Pendientes de Aprobacion</h2></div>
      ${pendingSubs.map(s => `
        <div class="request-card urgent">
          <strong>Aprobacion Sub-Usuario</strong> — <span class="badge badge-pending">Pendiente</span>
          <div class="request-meta">
            <span>Nombre: ${s.name}</span>
            <span>Email: ${s.email}</span>
            <span>Telefono: ${s.phone || '—'}</span>
            <span>${formatMadrid(s.createdAt)}</span>
          </div>
          <div class="request-actions">
            <button class="btn btn-green btn-sm" onclick="approveSub('${s.id}')">Aprobar</button>
            <button class="btn btn-red btn-sm" onclick="rejectSub('${s.id}')">Rechazar</button>
          </div>
        </div>
      `).join('')}
    </div>` : ''}
    ${pending.length > 0 ? `<div class="card"><div class="card-header"><h2>Solicitudes Pendientes</h2></div>
      ${pending.map(r => `
        <div class="request-card urgent">
          <strong>${typeLabel[r.type] || r.type}</strong> — <span class="badge badge-pending">Pendiente</span>
          <div class="request-meta">
            <span>Cliente: ${r.clientName} (${r.company})</span>
            <span>SIM: ${r.simSerial}</span>
            ${r.serviceType ? `<span>Servicio: ${r.serviceType}</span>` : ''}
            ${r.planType ? `<span>Plan: ${r.planType}</span>` : ''}
            ${r.plan ? `<span>Recarga: ${r.plan}</span>` : ''}
            ${r.activationType ? `<span>Tipo: ${r.activationType === 'immediate' ? 'Inmediata' : 'Programada: ' + r.scheduledDate}</span>` : ''}
            <span>${formatMadrid(r.createdAt)}</span>
          </div>
          <div class="request-actions">
            ${r.type === 'activation' ? `<button class="btn btn-coral btn-sm" onclick="editSimThenComplete('${r.id}','${r.simId}')">Cargar datos y completar</button>` : ''}
            ${r.type === 'balance_update' ? `<button class="btn btn-green btn-sm" onclick="editSimThenCompleteBalanceUpdate('${r.id}','${r.simId}')">Completar</button>` : ''}
            ${r.type !== 'activation' && r.type !== 'balance_update' ? `<button class="btn btn-green btn-sm" onclick="completeReq('${r.id}')">Completar</button>` : ''}
            <button class="btn btn-red btn-sm" onclick="rejectReq('${r.id}')">Rechazar</button>
          </div>
        </div>
      `).join('')}
    </div>` : (pendingSubs.length === 0 ? '<div class="card"><p style="color:var(--gray-500)">No hay solicitudes pendientes</p></div>' : '')}
    ${completed.length > 0 ? `<div class="card"><div class="card-header"><h2>Historial</h2></div>
      <table>
        <thead><tr><th>Tipo</th><th>SIM</th><th>Cliente</th><th>Estado</th><th>Fecha</th></tr></thead>
        <tbody>
          ${completed.slice(0, 30).map(r => `
            <tr><td>${typeLabel[r.type]||r.type}</td><td style="font-family:monospace;font-size:12px">${r.simSerial}</td>
            <td>${r.clientName}</td><td><span class="badge badge-${r.status}">${r.status}</span></td>
            <td>${formatMadrid(r.createdAt)}</td></tr>
          `).join('')}
        </tbody>
      </table>
    </div>` : ''}
  `;
}

async function completeReq(reqId) {
  await api(`/api/admin/requests/${reqId}/complete`, { method: 'POST' });
  toast('Solicitud completada', 'success');
  render();
}

async function rejectReq(reqId) {
  if (!confirm('Rechazar esta solicitud?')) return;
  await api(`/api/admin/requests/${reqId}/reject`, { method: 'POST', body: '{}' });
  toast('Solicitud rechazada', 'info');
  render();
}

  await editSim(simId, reqId);
}

    const svcPlans = plans[svc] || [];
    if (svcPlans.length > 0) {
      planOptions += `<optgroup label="${svc}">`;
      svcPlans.forEach(p => {
        planOptions += `<option value="${p}" ${sim.planType === p ? 'selected' : ''}>${p}</option>`;

  const mc = document.getElementById('modalContainer');

function filterSimsTable() {
  const searchVal = (document.getElementById('simSearchInput')?.value || '').toLowerCase();
  const clientVal = document.getElementById('simClientFilter')?.value || '';

  let filtered = allSimsCache;

  if (clientVal) {
    filtered = filtered.filter(s => s.clientId === clientVal);
  }

  if (searchVal) {
    filtered = filtered.filter(s => {
      const usr = allUsersCache.find(u => u.id === s.clientId);
      const clientName = usr ? usr.name.toLowerCase() : '';
      return (s.serial || '').toLowerCase().includes(searchVal) ||
             (s.msisdn || '').toLowerCase().includes(searchVal) ||
             (s.name || '').toLowerCase().includes(searchVal) ||
             clientName.includes(searchVal);
    });
  }

  const tbody = document.getElementById('simsTableBody');
  if (!tbody) return;

  tbody.innerHTML = filtered.map(s => {
    const usr = allUsersCache.find(u => u.id === s.clientId);
    return `
    <tr>
      <td style="font-family:monospace;font-size:12px">${s.serial}</td>
      <td>${s.msisdn || '—'}</td>
      <td>${usr ? usr.name : (s.clientId ? s.clientId : '<span style="color:var(--gray-300)">Sin asignar</span>')}</td>
      <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.planType || '—'}</td>
      <td>${s.balance} min</td>
      <td><span class="badge badge-${s.status}">${s.status}</span></td>
      <td style="font-size:12px">${formatMadrid(s.lastUpdated)}</td>
      <td><button class="btn btn-outline btn-sm" onclick="editSim('${s.id}')">Editar</button>
      <button class="btn btn-red btn-sm" onclick="deleteSim('${s.id}')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></td>
    </tr>`;
  }).join('');
}

function showBulkUpload() {
  const mc = document.getElementById('modalContainer');
  mc.innerHTML = `
    <div class="modal-overlay">
      <div class="modal">
        <h2>Cargar SIMs desde archivo</h2>
        <p style="color:var(--gray-500);font-size:13px;margin-bottom:16px">Suba un archivo CSV con una SIM por linea en formato: <code>serial,cardType</code></p>
        <div class="form-group">
          <label>Archivo CSV / XLSX</label>
          <input type="file" id="bulkFile" accept=".csv,.xlsx" style="padding:8px">
        </div>
        <div id="bulkPreview" style="margin-bottom:12px"></div>
        <div class="modal-actions">
          <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
          <button class="btn btn-coral" onclick="processBulkUpload()">Cargar SIMs</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('bulkFile').addEventListener('change', previewBulk);
}

function previewBulk(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const text = ev.target.result;
    const lines = text.trim().split('\n').filter(l => l.trim());
    document.getElementById('bulkPreview').innerHTML = `
      <p style="font-size:13px;color:var(--gray-500)">${lines.length} SIMs detectadas en el archivo</p>
    `;
  };
  reader.readAsText(file);
}

async function processBulkUpload() {
  const file = document.getElementById('bulkFile').files[0];
  if (!file) return toast('Seleccione un archivo', 'error');
  const reader = new FileReader();
  reader.onload = async function(ev) {
    const text = ev.target.result;
    const lines = text.trim().split('\n').filter(l => l.trim());
    const sims = lines.map(line => {
      const parts = line.split(',').map(p => p.trim());
      return { serial: parts[0], cardType: parts[1] || '' };
    }).filter(s => s.serial);

    if (sims.length === 0) return toast('No se encontraron SIMs validas', 'error');

    const res = await api('/api/admin/sims/bulk', {
      method: 'POST',
      body: JSON.stringify({ sims })
    });
    if (res?.error) return toast(res.error, 'error');
    closeModal();
    toast(`${sims.length} SIMs cargadas correctamente`, 'success');
    render();
  };
  reader.readAsText(file);
}

// === AIRTIME ===
let airtimeData = null;
let airtimeServices = [];

async function renderAirtime(el) {
  const response = await api('/api/admin/plans');
  if (!response) { airtimeData = {}; airtimeServices = []; }
  else {
    // Handle response format: { services: [...], plans: { ... } }
    if (response.services && response.plans) {
      airtimeServices = response.services;
      airtimeData = response.plans;
    } else {
      // Fallback: response is the plans object itself
      airtimeData = response;
      airtimeServices = Object.keys(airtimeData);
    }
  }

  el.innerHTML = `
    <div class="page-header"><h1>Airtime — Planes</h1><p>Gestion de planes disponibles por tipo de servicio. Estos planes aparecen en los dropdowns de activacion y recarga del cliente.</p></div>
    <div id="airtimeContent"></div>
    <div style="margin-top:16px;display:flex;gap:10px">
      <button class="btn btn-outline" onclick="addServiceType()">+ Nuevo Tipo de Servicio</button>
      <button class="btn btn-coral" onclick="saveAirtime()">Guardar Cambios</button>
    </div>
  `;
  renderAirtimeContent();
}

function renderAirtimeContent() {
  const container = document.getElementById('airtimeContent');
  if (!container) return;
  // Use airtimeServices for ordering, fall back to keys
  const types = airtimeServices.length > 0 ? airtimeServices : Object.keys(airtimeData);
  container.innerHTML = types.map(type => `
    <div class="plan-category">
      <div class="plan-category-header">
        <h3>${type}</h3>
        <div class="btn-header-group">
          <button class="btn btn-outline btn-sm" onclick="renameServiceType('${type}')">Renombrar</button>
        </div>
      </div>
      ${(airtimeData[type] || []).map((plan, idx) => `
        <div class="plan-item">
          <span>${plan}</span>
          <div style="display:flex;gap:6px">
            <button onclick="editPlan('${type}', ${idx})" title="Editar" style="color:var(--blue)">&#9998;</button>
            <button onclick="removePlan('${type}', ${idx})" title="Eliminar"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
          </div>
        </div>
      `).join('')}
      ${(airtimeData[type] || []).length === 0 ? '<p style="color:var(--gray-300);font-size:13px;padding:8px">Sin planes</p>' : ''}
      <div class="add-plan-row">
        <input id="newPlan_${type.replace(/[^a-zA-Z0-9]/g,'_')}" placeholder="Nombre del nuevo plan..." onkeydown="if(event.key==='Enter')addPlanInline('${type}')">
        <button class="btn btn-green btn-sm" onclick="addPlanInline('${type}')">Agregar</button>
      </div>
    </div>
  `).join('');

  if (types.length === 0) {
    container.innerHTML = '<div class="card"><p style="color:var(--gray-500)">No hay tipos de servicio configurados. Agregue uno para comenzar.</p></div>';
  }
}

function addServiceType() {
  const name = prompt('Nombre del nuevo tipo de servicio:');
  if (!name || !name.trim()) return;
  if (airtimeData[name.trim()]) return toast('Ya existe ese tipo de servicio', 'error');
  airtimeData[name.trim()] = [];
  if (!airtimeServices.includes(name.trim())) airtimeServices.push(name.trim());
  renderAirtimeContent();
}

function renameServiceType(oldName) {
  const newName = prompt('Nuevo nombre para "' + oldName + '":', oldName);
  if (!newName || !newName.trim() || newName.trim() === oldName) return;
  if (airtimeData[newName.trim()]) return toast('Ya existe ese tipo de servicio', 'error');
  airtimeData[newName.trim()] = airtimeData[oldName];
  delete airtimeData[oldName];
  const idx = airtimeServices.indexOf(oldName);
  if (idx !== -1) airtimeServices[idx] = newName.trim();
  else airtimeServices.push(newName.trim());
  renderAirtimeContent();
}

function addPlanInline(type) {
  const inputId = 'newPlan_' + type.replace(/[^a-zA-Z0-9]/g, '_');
  const input = document.getElementById(inputId);
  if (!input) return;
  const plan = input.value.trim();
  if (!plan) return;
  if (!airtimeData[type]) airtimeData[type] = [];
  airtimeData[type].push(plan);
  renderAirtimeContent();
}

function addPlanToType(type) {
  const plan = prompt('Nombre del nuevo plan para "' + type + '":');
  if (!plan || !plan.trim()) return;
  airtimeData[type].push(plan.trim());
  renderAirtimeContent();
}

function removePlan(type, idx) {
  airtimeData[type].splice(idx, 1);
  renderAirtimeContent();
}

function editPlan(type, idx) {
  const currentName = airtimeData[type][idx];
  const newName = prompt('Editar plan:', currentName);
  if (!newName || !newName.trim() || newName.trim() === currentName) return;
  airtimeData[type][idx] = newName.trim();
  renderAirtimeContent();
}

async function saveAirtime() {
  // Send the full plans object via PUT
  const payload = airtimeData;
  const res = await api('/api/admin/plans', {
    method: 'PUT',
    body: JSON.stringify(payload)
  });
  if (res?.error) return toast(res.error, 'error');
  // Refresh cached plans data
  cachedPlansData = null;
  toast('Planes guardados. Los cambios se reflejan en los dropdowns del cliente.', 'success');
}

// === ACTIVITY ===
async function renderActivity(el) {
  const [logs, reqs] = await Promise.all([
    api('/api/activity'),
    api('/api/admin/requests')
  ]);

  const typeLabel = { activation: 'Activacion', deactivation: 'Desactivacion', recharge: 'Recarga', balance_update: 'Actualizar Saldo', account_creation: 'Creacion de Cuenta', subuser_approval: 'Aprobacion Sub-Usuario' };

  // Build comprehensive activity from requests
  const reqActivities = (reqs || []).map(r => ({
    action: 'Solicitud: ' + (typeLabel[r.type] || r.type),
    details: `Cliente: ${r.clientName || ''} | SIM: ${r.simSerial || ''} | Estado: ${r.status}`,
    user: r.clientName || '',
    timestamp: r.createdAt,
    status: r.status,
    _isReq: true
  }));

  // Combine and deduplicate
  const allActivity = [...(logs || [])];
  reqActivities.forEach(ra => {
    const exists = allActivity.some(a => a.details && a.details === ra.details && a.timestamp === ra.timestamp);
    if (!exists) allActivity.push(ra);
  });
  allActivity.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

  el.innerHTML = `
    <div class="page-header"><h1>Actividad</h1><p>Registro completo de actividad del sistema — ${allActivity.length} registros</p></div>
    <div class="card">
      <div class="card-header"><h2>Log de Actividad</h2></div>
      <table>
        <thead><tr><th>Accion</th><th>Detalles</th><th>Usuario</th><th>Estado</th><th>Fecha</th></tr></thead>
        <tbody>
          ${allActivity.length === 0 ? '<tr><td colspan="5" style="color:var(--gray-500);text-align:center;padding:24px">No hay registros de actividad</td></tr>' : ''}
          ${allActivity.slice(0, 200).map(l => `
            <tr>
              <td><strong>${l.action || '—'}</strong></td>
              <td>${l.details || '—'}</td>
              <td>${l.user || l.userName || '—'}</td>
              <td>${l.status ? `<span class="badge badge-${l.status}">${l.status}</span>` : '—'}</td>
              <td style="white-space:nowrap">${formatMadrid(l.timestamp)}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}

// === NOTIFICATIONS ===
let emailTemplates = {};

async function loadEmailTemplates() {
  emailTemplates = await api('/api/admin/email-templates') || {};
  return emailTemplates;
}

const TEMPLATE_NAMES = {
  'sim-request-received': 'Solicitud SIM Recibida',
  'sim-request-approved': 'Solicitud SIM Aprobada',
  'sim-request-rejected': 'Solicitud SIM Rechazada',
  'sim-activated': 'SIM Activada',
  'sim-suspended': 'SIM Suspendida',
  'sim-cancelled': 'SIM Cancelada',
  'plan-changed': 'Cambio de Plan',
  'balance-low': 'Saldo Bajo',
  'balance-recharged': 'Recarga de Saldo',
  'subuser-created': 'Sub-usuario Creado',
  'subuser-removed': 'Sub-usuario Eliminado',
  'welcome': 'Bienvenida',
  'password-reset': 'Restablecer Contrasena'
};

async function renderNotifications(el) {
  let settings = {};
  try {
    settings = await api('/api/admin/notifications') || {};
  } catch(e) {
    settings = {};
  }

  await loadEmailTemplates();

  const templateIds = Object.keys(TEMPLATE_NAMES);
  const templateCardsHtml = templateIds.map(id => {
    const tpl = emailTemplates[id] || {};
    const name = TEMPLATE_NAMES[id];
    const subject = tpl.subject || '(sin asunto)';
    const fromEmail = tpl.fromEmail || settings.smtpFrom || '(default SMTP)';
    return `
      <div class="template-card">
        <div class="template-card-info">
          <h4>${name}</h4>
          <p>${subject}</p>
          <p style="margin-top:2px;font-size:11px;color:var(--gray-300)">${fromEmail}</p>
        </div>
        <button class="btn btn-outline btn-sm" onclick="showEditTemplate('${id}')">Editar</button>
      </div>
    `;
  }).join('');

  el.innerHTML = `
    <div class="page-header"><h1>Notificaciones</h1><p>Configuracion SMTP y plantillas de email</p></div>
    <div class="card">
      <div class="card-header"><h2>Configuracion SMTP</h2></div>
      <p style="color:var(--gray-500);font-size:13px;margin-bottom:16px">Configure SMTP para enviar emails. Por defecto configurado para IONOS.</p>
      <div class="form-row">
        <div class="form-group"><label>SMTP Host</label><input id="smtpHost" value="${settings.smtpHost || ''}" placeholder="smtp.ionos.es"></div>
        <div class="form-group"><label>SMTP Port</label><input id="smtpPort" type="number" value="${settings.smtpPort || ''}" placeholder="587"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>SMTP User</label><input id="smtpUser" value="${settings.smtpUser || ''}" placeholder="user@sudominio.com"></div>
        <div class="form-group"><label>SMTP Password</label><input id="smtpPass" type="password" value="${settings.smtpPassword || ''}" placeholder="********"></div>
      </div>
      <div class="form-group"><label>SMTP From (remitente por defecto)</label><input id="smtpFrom" value="${settings.smtpFrom || ''}" placeholder="SkyConnect <noreply@sudominio.com>"></div>
      <div style="margin-top:16px">
        <button class="btn btn-coral" onclick="saveSmtpSettings()">Guardar SMTP</button>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><h2>Plantillas de Email</h2></div>
      <p style="color:var(--gray-500);font-size:13px;margin-bottom:16px">Edite el asunto, remitente y contenido HTML de cada plantilla de email.</p>
      <div class="template-grid">
        ${templateCardsHtml}
      </div>
    </div>
  `;
}

async function saveSmtpSettings() {
  const data = {
    smtpHost: document.getElementById('smtpHost').value,
    smtpPort: parseInt(document.getElementById('smtpPort').value) || null,
    smtpUser: document.getElementById('smtpUser').value,
    smtpPassword: document.getElementById('smtpPass').value,
    smtpFrom: document.getElementById('smtpFrom').value
  };
  const res = await api('/api/admin/notifications', {
    method: 'PUT',
    body: JSON.stringify(data)
  });
  if (res?.error) return toast(res.error, 'error');
  toast('Configuracion SMTP guardada', 'success');
}

let _previewDebounce = null;

function showEditTemplate(templateId) {
  const tpl = emailTemplates[templateId] || {};
  const name = TEMPLATE_NAMES[templateId] || templateId;
  const subject = tpl.subject || '';
  const fromEmail = tpl.fromEmail || '';
  const htmlBody = tpl.htmlBody || '';

  const escapedHtml = htmlBody.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

  document.getElementById('modalContainer').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal modal-wide">
        <h2>Editar plantilla: ${name}</h2>
        <div class="form-row">
          <div class="form-group">
            <label>Asunto</label>
            <input id="tplSubject" value="${subject.replace(/"/g,'&quot;')}" placeholder="Asunto del email">
          </div>
          <div class="form-group">
            <label>From Email (dejar vacio para usar default SMTP)</label>
            <input id="tplFromEmail" value="${fromEmail.replace(/"/g,'&quot;')}" placeholder="noreply@sudominio.com">
          </div>
        </div>
        <div class="template-editor">
          <div>
            <label style="display:block;font-size:12px;font-weight:600;color:var(--gray-500);margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px">HTML Body</label>
            <textarea class="template-textarea" id="tplHtmlBody" oninput="debouncedPreviewUpdate()">${escapedHtml}</textarea>
          </div>
          <div>
            <label style="display:block;font-size:12px;font-weight:600;color:var(--gray-500);margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px">Vista Previa</label>
            <div class="template-preview">
              <iframe id="tplPreviewFrame" sandbox="allow-same-origin"></iframe>
            </div>
          </div>
        </div>
        <div class="template-vars">
          <strong style="color:var(--navy)">Variables disponibles:</strong><br>
          <code>{{clientName}}</code> Nombre del cliente
          <code>{{company}}</code> Empresa
          <code>{{simSerial}}</code> Serial de la SIM
          <code>{{simNumber}}</code> Numero de la SIM
          <code>{{requestType}}</code> Tipo de solicitud
          <code>{{planType}}</code> Tipo de plan
          <code>{{serviceType}}</code> Tipo de servicio
          <code>{{date}}</code> Fecha
          <code>{{subuserName}}</code> Nombre sub-usuario
          <code>{{subuserEmail}}</code> Email sub-usuario
          <code>{{balance}}</code> Saldo
        </div>
        <div class="modal-actions">
          <button class="btn btn-outline" onclick="sendTestEmail('${templateId}')">Enviar prueba</button>
          <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
          <button class="btn btn-coral" onclick="saveTemplate('${templateId}')">Guardar</button>
        </div>
      </div>
    </div>
  `;

  // Initial preview
  updateTemplatePreview();
}

function debouncedPreviewUpdate() {
  clearTimeout(_previewDebounce);
  _previewDebounce = setTimeout(updateTemplatePreview, 300);
}

function updateTemplatePreview() {
  const iframe = document.getElementById('tplPreviewFrame');
  const html = document.getElementById('tplHtmlBody')?.value || '';
  if (!iframe) return;
  const doc = iframe.contentDocument || iframe.contentWindow.document;
  doc.open();
  doc.write(html);
  doc.close();
}

async function saveTemplate(templateId) {
  const data = {
    subject: document.getElementById('tplSubject').value,
    fromEmail: document.getElementById('tplFromEmail').value,
    htmlBody: document.getElementById('tplHtmlBody').value
  };
  const res = await api('/api/admin/email-templates/' + templateId, {
    method: 'PUT',
    body: JSON.stringify(data)
  });
  if (res?.error) return toast(res.error, 'error');
  toast('Plantilla guardada', 'success');
  emailTemplates[templateId] = { ...emailTemplates[templateId], ...data };
  closeModal();
  renderNotifications(document.getElementById('main'));
}

async function sendTestEmail(templateId) {
  const res = await api('/api/admin/email-templates/' + templateId + '/test', {
    method: 'POST'
  });
  if (res?.error) return toast(res.error, 'error');
  toast('Email de prueba enviado', 'success');
}

// === BRANDING ===
async function renderBranding(el) {
  const logoInfo = await api('/api/admin/logo');
  const t = Date.now(); // cache bust
  el.innerHTML = `
    <div class="page-header"><h1>Logo / Marca</h1><p>Suba su logo para que aparezca en el login y sidebar del cliente</p></div>

    <div class="card">
      <div class="card-header"><h2>Logo Principal (fondo claro)</h2></div>
      <p style="color:var(--gray-500);font-size:13px;margin-bottom:16px">Este logo aparece en la pagina de login (fondo blanco). Use un PNG con fondo transparente y colores oscuros.</p>
      <div style="display:flex;gap:24px;align-items:center;flex-wrap:wrap">
        <div style="background:#fff;border:2px dashed var(--gray-200);border-radius:12px;padding:24px;min-width:220px;text-align:center">
          ${logoInfo?.hasLogo ? `<img src="/logo.png?t=${t}" style="max-width:200px;max-height:80px">` : '<span style="color:var(--gray-300)">Sin logo</span>'}
        </div>
        <div>
          <input type="file" id="logoFile" accept="image/png,image/jpeg,image/svg+xml" style="display:none" onchange="uploadLogo('logo','logoFile')">
          <button class="btn btn-coral" onclick="document.getElementById('logoFile').click()">Subir Logo</button>
          ${logoInfo?.hasLogo ? `<button class="btn btn-outline" style="margin-left:8px" onclick="deleteLogo()">Eliminar</button>` : ''}
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><h2>Logo Claro (fondo oscuro)</h2></div>
      <p style="color:var(--gray-500);font-size:13px;margin-bottom:16px">Este logo aparece en el sidebar (fondo navy oscuro). Use un PNG con fondo transparente y colores claros/blancos. Si no sube uno, se usara el logo principal.</p>
      <div style="display:flex;gap:24px;align-items:center;flex-wrap:wrap">
        <div style="background:var(--navy);border-radius:12px;padding:24px;min-width:220px;text-align:center">
          ${logoInfo?.hasLogoLight ? `<img src="/logo-light.png?t=${t}" style="max-width:200px;max-height:60px">` : (logoInfo?.hasLogo ? `<img src="/logo.png?t=${t}" style="max-width:200px;max-height:60px">` : '<span style="color:rgba(255,255,255,.3)">Sin logo</span>')}
        </div>
        <div>
          <input type="file" id="logoLightFile" accept="image/png,image/jpeg,image/svg+xml" style="display:none" onchange="uploadLogo('logoLight','logoLightFile')">
          <button class="btn btn-navy" onclick="document.getElementById('logoLightFile').click()">Subir Logo Claro</button>
        </div>
      </div>
    </div>

    <div class="card" style="border-left:3px solid var(--blue)">
      <p style="font-size:13px;color:var(--gray-500)"><strong style="color:var(--navy)">Consejo:</strong> El logo principal se usa en la pantalla de login (fondo blanco). El logo claro se usa en el sidebar (fondo azul marino). Si solo tiene un logo, subalo como principal y tambien como logo claro si se ve bien sobre fondo oscuro.</p>
    </div>
  `;
}

function uploadLogo(field, inputId) {
  const file = document.getElementById(inputId).files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (e) => {
    const body = {};
    body[field] = e.target.result;
    await api('/api/admin/logo', {
      method: 'POST',
      body: JSON.stringify(body)
    });
    toast('Logo actualizado', 'success');
    renderBranding(document.getElementById('main'));
  };
  reader.readAsDataURL(file);
}

async function deleteLogo() {
  if (!confirm('Eliminar todos los logos?')) return;
  await api('/api/admin/logo', { method: 'DELETE' });
  toast('Logos eliminados', 'info');
  renderBranding(document.getElementById('main'));
}

// === HELPERS ===
function closeModal() { document.getElementById('modalContainer').innerHTML = ''; }
function toast(msg, type = 'success') {
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}
async function logout() {
  await fetch('/api/logout', { method: 'POST' });
  window.location.href = '/';
}

// Init
render();
</script>
